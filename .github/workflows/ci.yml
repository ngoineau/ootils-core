name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  typecheck:
    name: mypy (non-blocking)
    runs-on: ubuntu-latest
    # Reports type issues without blocking merges. The codebase has untyped
    # boundaries (psycopg row dicts, dynamic SQL helpers); strict mode is a
    # future goal. See [tool.mypy] in pyproject.toml.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: python -m mypy src/ootils_core

  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ootils
          POSTGRES_PASSWORD: ootils
          POSTGRES_DB: ootils_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ootils -d ootils_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ootils:ootils@localhost:5432/ootils_test
      OOTILS_DSN: postgresql://ootils:ootils@localhost:5432/ootils_test
      OOTILS_API_TOKEN: test-token-ci
      OOTILS_ENABLE_STARTUP_RECOVERY: "0"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short --ignore=tests/integration --ignore=tests/smoke

  integration:
    name: pytest integration
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ootils
          POSTGRES_PASSWORD: ootils
          POSTGRES_DB: ootils_test_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ootils -d ootils_test_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ootils:ootils@localhost:5432/ootils_test_integration
      OOTILS_DSN: postgresql://ootils:ootils@localhost:5432/ootils_test_integration
      OOTILS_API_TOKEN: test-token-ci
      OOTILS_ENABLE_STARTUP_RECOVERY: "0"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration suite
        # Previously only test_phase1_e2e.py ran here, masking ~21 test
        # failures across the other 13 integration files. R11 of
        # REVIEW-2026-05 closed that gap by fixing the failures and
        # widening the scope.
        run: python -m pytest tests/integration/ -q --tb=short

      - name: MRP A-vs-B parity guard (#332)
        # ADR-020 step 1 — cross-engine drift guard on the same ephemeral
        # Postgres as the suite above. The integration conftest DROPs every
        # public table at module teardown, so this step re-applies migrations
        # (OotilsDB() constructor), seeds the deterministic demo dataset, then
        # runs the parity harness in --check mode. Thresholds documented in
        # scripts/parity_mrp_engines.py::check_thresholds — anti-regression
        # band, NOT a convergence target; tighten after ADR-020 steps 3-4.
        #
        # --max-median-drift 0.30: the 5% default was calibrated on the pilot
        # DB (36K items, 4.1% residual). The demo seed has exactly 2 planned
        # items, so "median" = midpoint of two drifts; first CI measurement:
        # 22.5%, and it moves with the run's weekday within [20.8%, 23.4%]
        # (engine B snaps buckets to Monday + applies the frozen fence per
        # bucket; engine A anchors day-offset buckets on CURRENT_DATE). This
        # drift is the DOCUMENTED ADR-020 residual class (pooled vs
        # per-location planning unit, L4L-without-multiple, component
        # independent demand dropped by B — see ADR-020 §Validation) owned by
        # ADR-020 steps 3-4, not a regression. 0.30 keeps ~30% headroom over
        # the weekday-worst 23.4% while still failing loudly on any return of
        # serial over-ordering (median was 96% pre-netting-fix).
        run: |
          python -c "from ootils_core.db.connection import OotilsDB; OotilsDB()"
          python scripts/seed_demo_data.py
          python scripts/parity_mrp_engines.py --horizon-days 360 --check --max-median-drift 0.30
