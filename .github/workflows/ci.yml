name: CI

on:
  push:
    branches: ["main", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]
    # 'labeled' added so applying the 'foundation' label to an open PR
    # actually triggers a run of the test-foundation job (default types
    # would ignore the label event). Side effect: labeling re-runs the
    # cheap jobs too — acceptable, they are minutes not gigabytes.
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    # Blocking: src/ootils_core type-checks clean under [tool.mypy] (see
    # pyproject.toml). The permissive-but-green baseline was reached by the
    # mypy campaign (PRs #378/#379); this gate keeps it from regressing.
    # Strict mode remains a future, rule-at-a-time goal.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy

      - name: Run mypy
        run: python -m mypy src/ootils_core

  security:
    name: pip-audit
    runs-on: ubuntu-latest
    # Blocking dependency-vulnerability gate (PROD-QW). Audits the RESOLVED
    # dependency tree of the project (core + dev extras) against the OSV / PyPI
    # advisory databases and FAILS the build on any known vulnerability.
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install pip-audit + project
        run: |
          # setuptools >= 83 : PYSEC-2026-3447 (advisory publiee 2026-07,
          # fix disponible) — on met a niveau l'outil d'environnement plutot
          # que d'ajouter un ignore, contrairement aux ignores documentes
          # ci-dessous qui n'ont PAS de fix atteignable.
          pip install --upgrade pip "setuptools>=83"
          pip install pip-audit
          pip install -e ".[dev]"

      - name: Run pip-audit
        # DOCUMENTED IGNORES — each is a vulnerability with NO fix reachable
        # within our pinned constraints, so failing on it would be permanent
        # noise, not an actionable signal. Keep this list SHORT and justified;
        # anything else must be fixed by bumping the offending dependency.
        #
        #   starlette (CVE-2026-48817 / CVE-2026-48818 / PYSEC-2026-161 /
        #   PYSEC-2026-248 / PYSEC-2026-249): all fixed only in starlette 1.x,
        #   but fastapi ~= 0.128.0 pins starlette < 0.51 (see pyproject.toml:28
        #   — bumping fastapi to a starlette-1.x line is a breaking major, out
        #   of scope for this gate). Revisit when fastapi is upgraded.
        #
        # NO --strict: under --strict a SKIP (including --skip-editable on our
        # own editable install) is promoted to a hard failure - the two flags
        # are contradictory. Without it, found vulnerabilities still exit 1
        # (the gate stays real); only collection skips are tolerated.
        # If the first run surfaces additional constraint-locked CVEs, add them
        # here WITH a one-line justification; do NOT silence a fixable one.
        run: >-
          pip-audit --skip-editable
          --ignore-vuln CVE-2026-48817
          --ignore-vuln CVE-2026-48818
          --ignore-vuln PYSEC-2026-161
          --ignore-vuln PYSEC-2026-248
          --ignore-vuln PYSEC-2026-249

  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ootils
          POSTGRES_PASSWORD: ootils
          POSTGRES_DB: ootils_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ootils -d ootils_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ootils:ootils@localhost:5432/ootils_test
      OOTILS_DSN: postgresql://ootils:ootils@localhost:5432/ootils_test
      OOTILS_API_TOKEN: test-token-ci
      OOTILS_ENABLE_STARTUP_RECOVERY: "0"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        # Coverage gate (PROD-QW). pytest-cov is already a dev dependency, so
        # this adds a measurement + a floor, not a new install. --cov-branch
        # counts branch coverage; term-missing:skip-covered keeps the log short
        # (only partially-covered files are listed).
        #
        # --cov-fail-under=40 is a DELIBERATELY CONSERVATIVE floor: this job
        # runs the unit suite only (integration/ + smoke/ excluded), so a lot of
        # integration-only code (seed/, staging/, tools/, deeper engine paths)
        # is counted as source but exercised elsewhere, dragging the TOTAL down.
        # The floor must never break a green build; ratchet it UP toward
        # floor(measured - 2) once the first run reports the real percentage.
        run: >-
          python -m pytest tests/ -q --tb=short
          --ignore=tests/integration --ignore=tests/smoke
          --cov=ootils_core --cov-branch
          --cov-report=term-missing:skip-covered
          --cov-fail-under=40

  integration:
    name: pytest integration
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ootils
          POSTGRES_PASSWORD: ootils
          POSTGRES_DB: ootils_test_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ootils -d ootils_test_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ootils:ootils@localhost:5432/ootils_test_integration
      OOTILS_DSN: postgresql://ootils:ootils@localhost:5432/ootils_test_integration
      OOTILS_API_TOKEN: test-token-ci
      OOTILS_ENABLE_STARTUP_RECOVERY: "0"

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration suite
        # Previously only test_phase1_e2e.py ran here, masking ~21 test
        # failures across the other 13 integration files. R11 of
        # REVIEW-2026-05 closed that gap by fixing the failures and
        # widening the scope.
        run: python -m pytest tests/integration/ -q --tb=short

      - name: MRP A-vs-B parity guard (#332 / #423 PR2)
        # ADR-020 step 4 landed: engine B (the APICS write path) now DELEGATES
        # its whole calculation to the core (engine A), so the two are the SAME
        # math and parity is a HARD guard, no longer an xfail documenting drift.
        # This step re-applies migrations (OotilsDB() constructor — the
        # integration conftest DROPs every public table at module teardown),
        # seeds the deterministic demo dataset, then runs the parity harness in
        # --check mode. Thresholds documented in
        # scripts/parity_mrp_engines.py::check_thresholds.
        #
        # --max-median-drift 0.05 (the script default): with B delegated to A
        # the residual is 0 by construction (both call the same
        # load_planning_data → consume_demand → run_timephased); the 5% cap is
        # kept as a loud regression trip if the two ever diverge again. The old
        # 0.30 documented the pre-delegation residual class (pooled vs
        # per-location, Monday-snap vs horizon anchor, dropped component
        # independent demand) that ADR-020 step 4 closes.
        run: |
          python -c "from ootils_core.db.connection import OotilsDB; OotilsDB()"
          python scripts/seed_demo_data.py
          python scripts/parity_mrp_engines.py --horizon-days 360 --check --max-median-drift 0.05

  test-foundation:
    name: pytest foundation (Chronos-2 real weights)
    runs-on: ubuntu-latest
    # OPT-IN job (ADR-024): torch CPU + Chronos-2 weights are ~1 GB+ of
    # downloads — far too heavy to run on every push. Trigger choice:
    # PR label 'foundation' OR manual workflow_dispatch, NOT a paths
    # filter. Rationale: a workflow-level paths filter would gate ALL
    # jobs (lint/test must keep running on every change), and a
    # per-job changed-files detection step costs a checkout + diff on
    # every single CI run just to usually skip — whereas the label/
    # dispatch condition below is evaluated for free from the event
    # payload, downloads nothing when not requested, and matches how
    # the wrapper is designed (foundation.py changes are covered by
    # the fake-pipeline unit tests in the normal 'test' job; only the
    # real-weights path needs this job, on human demand).
    # When it DOES run it must pass: continue-on-error stays false.
    continue-on-error: false
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'foundation'))
    env:
      # No DATABASE_URL: the foundation marker lives in a pure unit file
      # (tests/test_pyramide_foundation.py) and the session fixture in
      # tests/conftest.py only touches Postgres when DATABASE_URL is set.
      OOTILS_API_TOKEN: test-token-ci

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Cache HuggingFace model weights
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          # Key = the model id: the weights only change when the default
          # model changes (revision drift within the repo is tolerated —
          # the run seals the actually-loaded revision in
          # pyramide_runs.model_revision, so provenance stays honest).
          key: hf-${{ runner.os }}-amazon-chronos-2

      - name: Install dependencies (foundation extra, CPU-only torch)
        run: |
          pip install --upgrade pip
          # CPU wheel first so the 'torch ~= 2.6' requirement of the
          # [foundation] extra is already satisfied — avoids pulling the
          # multi-GB CUDA build from PyPI.
          pip install "torch~=2.6" --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,foundation]"

      - name: Pre-download Chronos-2 weights
        # Populates ~/.cache/huggingface (no-op on cache hit: only
        # missing files are fetched) so the pytest step never mixes
        # network flakiness with test failures.
        run: |
          python -c "from huggingface_hub import snapshot_download; snapshot_download('amazon/chronos-2')"

      - name: Run foundation tests (real weights)
        run: python -m pytest tests/ -m foundation -q --tb=short --ignore=tests/integration --ignore=tests/smoke
