syntax = "proto3";

package ootils.engine.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// ============================================================================
// ootils.engine.v1 — gRPC contract between Python (FastAPI) and the Rust
// in-memory engine service (ADR-017 Architecture B).
//
// # Evolution policy (F-059 audit closure)
//
// ALLOWED inside v1 (additive, backward-compatible):
//   - New `rpc` methods on the Engine service.
//   - New fields in existing messages (use a fresh field number,
//     do NOT reuse retired numbers).
//   - New enum values appended at the end of an enum.
//   - New message types.
//
// REQUIRES v2 (new package `ootils.engine.v2`, both run side-by-side
// during migration):
//   - Removing or renaming an rpc method.
//   - Removing or renaming a field, OR repurposing a field number.
//   - Changing a field's type (e.g. int64 → string).
//   - Reordering oneof members, removing oneof members.
//   - Changing a counter's signedness (e.g. F-042: int64 → uint64
//     for ootils_engine_events_total et al. is a breaking change —
//     deferred to v2 alongside the pagination work for ListScenarios
//     [F-054]).
//
// Counter types in v1 use int64 for backward-compat. Treat them as
// unsigned in practice (counters never decrement). At ~2^63 events
// = thousands of years at 5K events/s — the v2 migration timeline
// is not pressured by this.
//
// This is the ONLY interface between the two processes. Any new
// operation must be added here first, then implemented on both
// sides.
// ============================================================================

service Engine {
  // -------------------------------------------------------------------- //
  //  Hot path — propagation + scenario lifecycle
  // -------------------------------------------------------------------- //

  // Propagate a single event synchronously. Returns once compute is done
  // and the in-RAM state is updated. Postgres write-behind is fire-and-
  // forget; the caller never waits for it.
  rpc Propagate(PropagateRequest) returns (PropagateResponse);

  // P3.2 (agent-first): batch variant. Apply N events sequentially
  // against the same scenario in a single round-trip. Each event is
  // processed serially (per-scenario lock semantics preserved), but
  // the gRPC handshake + tokio dispatch happens once. For agents
  // exploring N variations of a decision, this collapses N RPCs
  // into one. Returns per-event results so the agent can extract
  // individual outcomes.
  rpc PropagateBatch(PropagateBatchRequest) returns (PropagateBatchResponse);

  // Fork a scenario via copy-on-write. Sub-µs since ArcSwap (P2.1.a).
  // If `parent_scenario_id` is empty or the baseline UUID, forks from
  // current baseline. Otherwise forks from the named scenario,
  // inheriting its overlay (P3.5 — agent MCTS tree branching).
  rpc ForkScenario(ForkRequest) returns (ScenarioInfo);

  // P3.4 (agent-first): bump last_accessed_at on a scenario so the
  // TTL eviction won't drop it. Use this for long-running agent
  // sessions that have idle gaps > TTL (e.g., a batch agent
  // pausing for human review).
  rpc HeartbeatScenario(HeartbeatRequest) returns (HeartbeatResponse);

  // Merge a scenario's overlay back into the baseline. Atomic via arc-swap.
  rpc MergeScenario(MergeRequest) returns (MergeResult);

  // Discard a scenario without merging. F-037/F-038 audit response:
  // the only way to dispose of a scenario used to be Merge, which
  // forced the planner's what-if to apply to baseline. Now what-ifs
  // can be cleanly dropped. Returns NotFound if the scenario_id
  // doesn't exist; the baseline scenario is rejected with
  // InvalidArgument (cannot delete the root).
  rpc DeleteScenario(DeleteRequest) returns (DeleteResult);

  // List active scenarios + their memory footprint.
  rpc ListScenarios(google.protobuf.Empty) returns (ScenarioList);

  // -------------------------------------------------------------------- //
  //  Reads — bypass Postgres lag, read directly from in-RAM state
  // -------------------------------------------------------------------- //

  rpc GetNode(NodeQuery) returns (NodeState);
  rpc QueryShortages(ShortagesQuery) returns (stream Shortage);

  // -------------------------------------------------------------------- //
  //  Real-time change stream — replaces SSE / WebSocket for the front-end
  // -------------------------------------------------------------------- //

  rpc StreamChanges(StreamRequest) returns (stream ChangeEvent);

  // -------------------------------------------------------------------- //
  //  Operational
  // -------------------------------------------------------------------- //

  rpc Health(google.protobuf.Empty) returns (HealthStatus);
  rpc Metrics(google.protobuf.Empty) returns (EngineMetrics);
}

// ---------------------------------------------------------------------- //
//  Messages
// ---------------------------------------------------------------------- //

message PropagateRequest {
  string scenario_id = 1;
  string event_id = 2;
  string event_type = 3;
  string trigger_node_id = 4;
  // Optional structured payload — engine interprets per event_type
  bytes payload = 5;
}

// P3.2 (agent-first) batch propagation. All events are applied to
// the same scenario_id; the engine acquires the per-scenario lock
// once and processes them serially. If any event errors, processing
// stops and the response reports how many succeeded — the agent can
// decide to retry or abort.
message PropagateBatchRequest {
  string scenario_id = 1;
  repeated BatchEvent events = 2;
}

message BatchEvent {
  string event_id = 1;
  string event_type = 2;
  string trigger_node_id = 3;
  bytes payload = 4;
}

message PropagateBatchResponse {
  repeated PropagateResponse results = 1;
  // If processing stopped on an error, this is the 0-based index
  // of the failing event + the error detail. results contains the
  // successful events before this index. -1 if all succeeded.
  int32 failed_at_index = 2;
  string failure_detail = 3;
}

message PropagateResponse {
  string calc_run_id = 1;
  int32 nodes_processed = 2;
  int32 nodes_changed = 3;
  int32 shortages_detected = 4;
  // Timing breakdown for observability
  EngineTiming timing = 5;
}

message EngineTiming {
  double dirty_expand_us = 1;
  double compute_us = 2;
  double shortage_detect_us = 3;
  double wal_fsync_us = 4;
  double total_us = 5;
}

message ForkRequest {
  // Empty or baseline UUID → fork from baseline. Otherwise fork from
  // the named scenario (P3.5 MCTS tree branching).
  string parent_scenario_id = 1;
  string name = 2;
  // P3.4: agent-friendly TTL. 0 = use engine default
  // (OOTILS_SCENARIO_TTL_SEC). Otherwise the scenario lives at least
  // this many seconds before eviction. Useful for batch agents that
  // know they need a longer-than-default lifetime.
  uint32 ttl_seconds = 3;
}

message HeartbeatRequest {
  string scenario_id = 1;
}

message HeartbeatResponse {
  // Seconds since the scenario was last accessed before this heartbeat.
  uint64 idle_seconds_before = 1;
}

message MergeRequest {
  string scenario_id = 1;
  string target_scenario_id = 2;
}

message MergeResult {
  int32 nodes_merged = 1;
  string new_baseline_generation = 2;
}

message DeleteRequest {
  string scenario_id = 1;
}

message DeleteResult {
  // # of overlay entries dropped — useful for ops sanity.
  int32 overlay_entries_freed = 1;
}

message ScenarioInfo {
  string id = 1;
  string name = 2;
  string parent_id = 3;
  google.protobuf.Timestamp created_at = 4;
  int32 overlay_size = 5;        // # of modified nodes
  int64 memory_bytes = 6;
}

message ScenarioList {
  repeated ScenarioInfo scenarios = 1;
}

message NodeQuery {
  string scenario_id = 1;
  string node_id = 2;
}

message NodeState {
  string node_id = 1;
  string node_type = 2;
  string item_id = 3;
  string location_id = 4;
  string opening_stock = 5;       // Decimal as string — precision parity with Python
  string inflows = 6;
  string outflows = 7;
  string closing_stock = 8;
  bool has_shortage = 9;
  string shortage_qty = 10;
  string time_span_start = 11;    // ISO date
  string time_span_end = 12;
  int32 bucket_sequence = 13;
}

message ShortagesQuery {
  string scenario_id = 1;
  // Filter
  string item_id = 2;             // optional
  string location_id = 3;         // optional
  string severity_class = 4;      // 'stockout' | 'below_safety_stock' | both
}

message Shortage {
  string shortage_id = 1;
  string pi_node_id = 2;
  string item_id = 3;
  string location_id = 4;
  string shortage_date = 5;
  string shortage_qty = 6;
  string severity_score = 7;
  string severity_class = 8;
}

message StreamRequest {
  string scenario_id = 1;
  bool include_baseline_changes = 2;
}

message ChangeEvent {
  google.protobuf.Timestamp timestamp = 1;
  string scenario_id = 2;
  string calc_run_id = 3;
  oneof event {
    NodeUpdated node_updated = 4;
    ShortageDetected shortage_detected = 5;
    ScenarioForked scenario_forked = 6;
  }
}

message NodeUpdated {
  string node_id = 1;
  string closing_stock = 2;
}

message ShortageDetected {
  string pi_node_id = 1;
  string shortage_qty = 2;
}

message ScenarioForked {
  string parent_id = 1;
  string new_id = 2;
}

message HealthStatus {
  enum Status {
    UNKNOWN = 0;
    SERVING = 1;
    DEGRADED = 2;
    NOT_SERVING = 3;
  }
  Status status = 1;
  string detail = 2;
  google.protobuf.Timestamp boot_time = 3;
  int64 uptime_seconds = 4;
}

message EngineMetrics {
  // Memory
  int64 baseline_graph_bytes = 1;
  int64 total_scenarios_bytes = 2;
  int32 active_scenarios = 3;

  // Throughput counters (since boot)
  int64 events_processed_total = 4;
  int64 nodes_recomputed_total = 5;
  int64 shortages_detected_total = 6;

  // Latency (microseconds)
  double propagate_p50_us = 7;
  double propagate_p95_us = 8;
  double propagate_p99_us = 9;

  // Write-behind queue
  int32 pg_writeback_queue_depth = 10;
  int64 wal_size_bytes = 11;
  google.protobuf.Timestamp last_pg_flush = 12;
}
